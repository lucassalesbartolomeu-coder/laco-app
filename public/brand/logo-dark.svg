<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- Logo horizontal — fundo escuro -->
  <!-- Símbolo 02: loops amêndoa, escala proporcional dentro do viewBox 60x60, centrado em y=30 -->
  <!-- Loop esquerdo: ivory com opacidade -->
  <path d="M8 30 C8 19 15 13 22 17 C26 20 28 25 30 30 C28 35 26 40 22 43 C15 47 8 41 8 30Z"
        fill="none" stroke="rgba(250,247,242,0.7)" stroke-width="2"/>
  <!-- Loop direito: gold sólido -->
  <path d="M52 30 C52 19 45 13 38 17 C34 20 32 25 30 30 C32 35 34 40 38 43 C45 47 52 41 52 30Z"
        fill="none" stroke="#C9A96E" stroke-width="2"/>
  <!-- Ponto central -->
  <ellipse cx="30" cy="30" rx="3" ry="4" fill="#C9A96E" opacity="0.85"/>
  <!-- Wordmark: LAÇO — Raleway 500, tracking 0.42em (~9px a 21px) -->
  <text x="72" y="37"
        font-family="Raleway, sans-serif"
        font-weight="500"
        font-size="21"
        letter-spacing="9"
        fill="#FAF7F2">LAÇO</text>
</svg>
