<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- Símbolo 02 — O Infinito / Laço Geométrico -->
  <!-- viewBox 0 0 60 60 | loops amêndoa verticais | fundo claro -->
  <!-- Loop esquerdo: midnight com opacidade -->
  <path d="M8 30 C8 19 15 13 22 17 C26 20 28 25 30 30 C28 35 26 40 22 43 C15 47 8 41 8 30Z"
        fill="none" stroke="rgba(26,31,58,0.7)" stroke-width="2"/>
  <!-- Loop direito: gold sólido -->
  <path d="M52 30 C52 19 45 13 38 17 C34 20 32 25 30 30 C32 35 34 40 38 43 C45 47 52 41 52 30Z"
        fill="none" stroke="#C9A96E" stroke-width="2"/>
  <!-- Ponto de cruzamento: ellipse gold vertical -->
  <ellipse cx="30" cy="30" rx="3" ry="4" fill="#C9A96E" opacity="0.85"/>
</svg>
